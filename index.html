<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quick Tidy ✨</title>
<style>
  :root {
    --cream: #FFF8F0;
    --warm-white: #FFFCF7;
    --coral: #FF6B5B;
    --coral-light: #FFE8E5;
    --goldenrod: #F5A623;
    --gold-light: #FFF3D6;
    --sage: #6BAA75;
    --sage-light: #E8F5EA;
    --sky: #4AABDB;
    --sky-light: #E3F4FB;
    --plum: #9B6B9B;
    --plum-light: #F3E8F3;
    --ink: #2D2416;
    --mid: #7A6A5A;
    --border: #EDE0D0;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–cream);
font-family: -apple-system, ‘Helvetica Neue’, Arial, sans-serif;
color: var(–ink);
min-height: 100vh;
padding-bottom: 40px;
}

header {
background: var(–coral);
padding: 20px 20px 16px;
text-align: center;
position: sticky;
top: 0;
z-index: 100;
box-shadow: 0 3px 12px rgba(255,107,91,0.3);
}

header h1 {
font-size: 1.7rem;
font-weight: 800;
color: #fff;
letter-spacing: -0.5px;
}

header .subtitle {
color: rgba(255,255,255,0.9);
font-size: 0.75rem;
font-weight: 600;
margin-top: 3px;
letter-spacing: 0.8px;
text-transform: uppercase;
}

.progress-bar-wrap {
background: rgba(255,255,255,0.3);
border-radius: 20px;
height: 9px;
margin: 12px 20px 0;
overflow: hidden;
}

.progress-bar-fill {
height: 100%;
background: #fff;
border-radius: 20px;
transition: width 0.5s ease;
width: 0%;
}

.progress-label {
text-align: center;
color: rgba(255,255,255,0.95);
font-size: 0.75rem;
font-weight: 700;
margin-top: 7px;
}

.rooms {
padding: 16px 16px 0;
display: flex;
flex-direction: column;
gap: 12px;
}

.room-card {
background: var(–warm-white);
border-radius: 16px;
border: 1.5px solid var(–border);
overflow: hidden;
}

.room-card.done {
opacity: 0.55;
border-color: transparent;
}

.room-header {
display: flex;
align-items: center;
padding: 14px 16px;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
user-select: none;
gap: 12px;
}

.room-icon {
font-size: 1.4rem;
flex-shrink: 0;
}

.room-title {
font-size: 1.05rem;
font-weight: 800;
flex: 1;
}

.room-count {
font-size: 0.72rem;
font-weight: 700;
padding: 4px 10px;
border-radius: 20px;
flex-shrink: 0;
color: #fff;
}

.room-chevron {
font-size: 0.8rem;
color: var(–mid);
transition: transform 0.2s;
flex-shrink: 0;
margin-left: 2px;
}

.room-card.open .room-chevron {
transform: rotate(180deg);
}

.room-done-badge {
font-size: 0.72rem;
font-weight: 700;
color: var(–sage);
background: var(–sage-light);
padding: 4px 10px;
border-radius: 20px;
}

.task-list {
display: none;
padding: 0 14px 14px;
flex-direction: column;
gap: 8px;
}

.room-card.open .task-list {
display: flex;
}

.task-item {
display: flex;
align-items: center;
gap: 12px;
padding: 11px 13px;
border-radius: 10px;
background: #fff;
border: 1.5px solid var(–border);
cursor: pointer;
-webkit-tap-highlight-color: transparent;
}

.task-checkbox {
width: 24px;
height: 24px;
border-radius: 7px;
border: 2px solid var(–border);
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
font-size: 0.85rem;
font-weight: 700;
background: #fff;
color: #fff;
}

.task-label {
font-size: 0.9rem;
line-height: 1.4;
font-weight: 500;
flex: 1;
}

.nudge {
font-size: 0.73rem;
color: var(–mid);
text-align: center;
padding: 4px 0 0;
font-weight: 600;
}

.all-done-msg {
text-align: center;
padding: 6px 0 0;
font-size: 0.88rem;
color: var(–sage);
font-weight: 700;
}

/* Room color themes */
.room-kitchen .room-header { background: var(–gold-light); }
.room-kitchen .room-title  { color: #8B6914; }
.room-kitchen .room-count  { background: var(–goldenrod); }

.room-dining .room-header  { background: var(–coral-light); }
.room-dining .room-title   { color: #C4391C; }
.room-dining .room-count   { background: var(–coral); }

.room-family .room-header  { background: var(–sky-light); }
.room-family .room-title   { color: #2277A0; }
.room-family .room-count   { background: var(–sky); }

.room-living .room-header  { background: var(–plum-light); }
.room-living .room-title   { color: #6B3B6B; }
.room-living .room-count   { background: var(–plum); }

.room-halfbath .room-header { background: var(–sage-light); }
.room-halfbath .room-title  { color: #3B6B44; }
.room-halfbath .room-count  { background: var(–sage); }

.room-fullbath1 .room-header { background: #E8F0FF; }
.room-fullbath1 .room-title  { color: #2D4CA0; }
.room-fullbath1 .room-count  { background: #5B7FDB; }

.room-fullbath2 .room-header { background: #FFF0F5; }
.room-fullbath2 .room-title  { color: #A03060; }
.room-fullbath2 .room-count  { background: #DB5B8A; }

.room-stairs .room-header  { background: #F5EEE8; }
.room-stairs .room-title   { color: #7A5030; }
.room-stairs .room-count   { background: #C4845A; }

/* Congrats screen */
.congrats {
display: none;
text-align: center;
padding: 50px 24px 30px;
}
.congrats.show { display: block; }
.congrats .big { font-size: 3.5rem; }
.congrats h2 {
font-size: 1.6rem;
font-weight: 800;
margin-top: 10px;
color: var(–coral);
}
.congrats p {
color: var(–mid);
margin-top: 8px;
font-size: 0.95rem;
line-height: 1.5;
}

.reset-btn {
display: inline-block;
margin-top: 24px;
background: var(–coral);
color: #fff;
border: none;
border-radius: 30px;
padding: 14px 36px;
font-size: 0.95rem;
font-weight: 700;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
box-shadow: 0 4px 14px rgba(255,107,91,0.4);
}
.reset-btn:active { opacity: 0.85; }
</style>

</head>
<body>

<header>
  <h1>Quick Tidy ✨</h1>
  <div class="subtitle">You've got this. One room at a time.</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <div class="progress-label" id="progressLabel">0 of 0 tasks done</div>
</header>

<div class="rooms" id="roomsContainer"></div>

<div class="congrats" id="congrats">
  <div class="big">🎉</div>
  <h2>You did it!</h2>
  <p>The whole house is done.<br>Take a breath and enjoy it.</p>
  <button class="reset-btn" onclick="resetAll()">Start Fresh</button>
</div>

<script>
const rooms = [
  {
    id: 'kitchen', cls: 'room-kitchen', icon: '🍳', title: 'Kitchen',
    tasks: [
      'Clear & wipe counters',
      'Load or unload dishwasher',
      'Wipe stovetop',
      'Wipe down sink',
      'Empty trash if full',
      'Quick sweep or spot-mop floor',
    ]
  },
  {
    id: 'dining', cls: 'room-dining', icon: '🪑', title: 'Dining Room',
    tasks: [
      'Clear table completely',
      'Wipe table surface',
      'Push chairs in',
      'Pick up anything off the floor',
      'Straighten any decor',
    ]
  },
  {
    id: 'family', cls: 'room-family', icon: '🛋️', title: 'Family Room',
    tasks: [
      'Pick up clutter & put things away',
      'Fluff and arrange cushions',
      'Fold or straighten throw blankets',
      'Clear off coffee table',
      'Quick vacuum or spot-clean rug',
    ]
  },
  {
    id: 'living', cls: 'room-living', icon: '🪴', title: 'Living Room',
    tasks: [
      'Pick up clutter',
      'Straighten pillows & cushions',
      'Dust visible surfaces',
      'Tidy any books or magazines',
      'Vacuum or spot-clean',
    ]
  },
  {
    id: 'halfbath', cls: 'room-halfbath', icon: '🚿', title: '½ Bath',
    tasks: [
      'Wipe toilet seat & outside bowl',
      'Wipe sink & faucet',
      'Wipe mirror',
      'Replace hand towel',
      'Restock soap if needed',
    ]
  },
  {
    id: 'fullbath1', cls: 'room-fullbath1', icon: '🛁', title: 'Full Bath #1',
    tasks: [
      'Wipe toilet seat & outside bowl',
      'Wipe sink & faucet',
      'Quick wipe of tub/shower surround',
      'Wipe mirror',
      'Replace towels',
      'Restock soap & TP if needed',
    ]
  },
  {
    id: 'fullbath2', cls: 'room-fullbath2', icon: '🛁', title: 'Full Bath #2',
    tasks: [
      'Wipe toilet seat & outside bowl',
      'Wipe sink & faucet',
      'Quick wipe of tub/shower surround',
      'Wipe mirror',
      'Replace towels',
      'Restock soap & TP if needed',
    ]
  },
  {
    id: 'stairs', cls: 'room-stairs', icon: '🪜', title: 'Stairs',
    tasks: [
      'Remove anything sitting on the stairs',
      'Return items to their proper rooms',
      'Vacuum or sweep each step',
      'Wipe handrail',
    ]
  },
];

const STATE_KEY = 'quicktidy_v2';
let state = {};
try { state = JSON.parse(localStorage.getItem(STATE_KEY)) || {}; } catch(e) { state = {}; }

function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}

function buildApp() {
  const container = document.getElementById('roomsContainer');
  container.innerHTML = '';

  rooms.forEach(room => {
    if (!state[room.id]) state[room.id] = { open: false, checked: {} };
    const rs = state[room.id];
    const total = room.tasks.length;
    const doneCount = Object.values(rs.checked).filter(Boolean).length;
    const allDone = doneCount === total;

    const card = document.createElement('div');
    card.className = `room-card ${room.cls}${rs.open ? ' open' : ''}${allDone ? ' done' : ''}`;

    const badge = allDone
      ? `<span class="room-done-badge">✓ Done!</span>`
      : `<span class="room-count">${doneCount}/${total}</span>`;

    const taskRows = room.tasks.map((task, i) => {
      if (rs.checked[i]) return '';
      return `<div class="task-item" onclick="toggleTask('${room.id}',${i})">
        <div class="task-checkbox" style="border-color:#ccc;"></div>
        <span class="task-label">${task}</span>
      </div>`;
    }).join('');

    const nudge = (!allDone && doneCount > 0)
      ? `<div class="nudge">${doneCount} task${doneCount > 1 ? 's' : ''} done — keep going! 💪</div>` : '';
    const allDoneMsg = allDone
      ? `<div class="all-done-msg">All done! ✨</div>` : '';

    card.innerHTML = `
      <div class="room-header" onclick="toggleRoom('${room.id}')">
        <span class="room-icon">${room.icon}</span>
        <span class="room-title">${room.title}</span>
        ${badge}
        <span class="room-chevron">${allDone ? '' : '▾'}</span>
      </div>
      <div class="task-list" id="tasks-${room.id}">
        ${taskRows}
        ${nudge}
        ${allDoneMsg}
      </div>`;

    container.appendChild(card);
  });

  updateProgress();
}

function toggleRoom(id) {
  state[id].open = !state[id].open;
  saveState();
  buildApp();
}

function toggleTask(roomId, i) {
  state[roomId].checked[i] = true;
  const total = rooms.find(r => r.id === roomId).tasks.length;
  const done = Object.values(state[roomId].checked).filter(Boolean).length;
  if (done === total) state[roomId].open = false;
  saveState();
  buildApp();
}

function updateProgress() {
  let total = 0, done = 0;
  rooms.forEach(r => {
    total += r.tasks.length;
    done += Object.values(state[r.id]?.checked || {}).filter(Boolean).length;
  });
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} of ${total} tasks done`;
  const allDone = done === total && total > 0;
  document.getElementById('congrats').classList.toggle('show', allDone);
  document.getElementById('roomsContainer').style.display = allDone ? 'none' : '';
}

function resetAll() {
  state = {};
  localStorage.removeItem(STATE_KEY);
  buildApp();
}

buildApp();
</script>

</body>
</html>
